<html>
	<head>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
		<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
		<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
		
		<script>
			<!-- $(document).ready(function(){  -->
			    function load()
				{
					window.open(url);
				}

				function load_gps(){
                    var longitude = $("#txtLongitude").val();
					var latitude = $("#txtLatitude").val();
					var zoom = $("#txtZoom").val();
					var anchor = document.getElementById("go");	
					var url ='https://www.google.com/maps/@' + longitude + ',' + latitude + ',' +zoom + 'z';			
					anchor.href = url;
				}
			<!-- });			 -->
		</script>
		
		<style>
		body{margin:40px;}
		.btn-circle {
		  width: 30px;
		  height: 30px;
		  text-align: center;
		  padding: 6px 0;
		  font-size: 12px;
		  line-height: 1.428571429;
		  border-radius: 15px;
		}
		.btn-circle.btn-lg {
		  width: 50px;
		  height: 50px;
		  padding: 10px 16px;
		  font-size: 18px;
		  line-height: 1.33;
		  border-radius: 25px;
		}
		.btn-circle.btn-xl {
		  width: 70px;
		  height: 70px;
		  padding: 10px 16px;
		  font-size: 24px;
		  line-height: 1.33;
		  border-radius: 35px;
		}
		</style>
	</head>
	
	<body>
		<center><h1>GPS</h1><br><br>
        
		<legend> 
			<fieldset>
				<input id="txtLongitude" type="text" placeholder="please enter Longitude" value='23.7370809'><br><br>
				<input id="txtLatitude" type="text" placeholder="please enter Latitude" value='90.4010302'><br><br>
				<input id="txtZoom" type="text" placeholder="please enter Zoom" value='18'> </br><br>
				<button id="load" class="btn btn-md btn-primary" onclick="load_gps()">GPS Load</button><br><br> 
				<a id="go" class="btn btn-md btn-success" target="_blank">Go</a>
			</fieldset>
		</legend>
		</center>
	</body>

</html>
